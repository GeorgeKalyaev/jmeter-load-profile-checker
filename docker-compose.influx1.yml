# Локальный InfluxDB 1.8 для проверки load_profile (HTTP auth выключен по умолчанию).
# Запуск: docker compose -f docker-compose.influx1.yml up -d
# Проверка: http://127.0.0.1:8086/ping → должно вернуть 204
services:
  influxdb:
    image: influxdb:1.8
    container_name: jmeter-influx-1-local
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: jmeter
