# Только для локальной проверки профиля (Windows). Не для продакшена.
# Запуск: influxd.exe -config путь\к\influxdb_local_dev.conf

# Запускайте influxd с WorkingDirectory = каталог JmeterReport (относительные пути).
[meta]
  dir = ".influx_local/meta"

[data]
  dir = ".influx_local/data"
  wal-dir = ".influx_local/wal"

[http]
  enabled = true
  bind-address = "127.0.0.1:8086"
